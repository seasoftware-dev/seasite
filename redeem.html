<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redeem Key | Sea Serverside</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-animation"></div>

    <div class="auth-container">
        <div class="auth-card glass center-text">
            <div class="auth-header">
                <div class="icon-circle">
                    <i class="fa-solid fa-key"></i>
                </div>
                <h2>Activate License</h2>
                <p>Please enter your unique license key to continue.</p>
            </div>

            <form id="redeemForm" class="auth-form">
                <div class="input-group">
                    <i class="fa-solid fa-ticket"></i>
                    <input type="text" id="licenseKey" placeholder="SEA-XXXX-XXXX-XXXX"
                        style="text-transform: uppercase; letter-spacing: 2px; font-family: monospace;" required>
                </div>

                <div class="security-badge">
                    <i class="fa-solid fa-shield-halved"></i> 256-bit Secure Redemption
                </div>

                <button type="submit" class="auth-btn">Redeem Key <i class="fa-solid fa-check"></i></button>
            </form>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
